<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATC Brawl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #222;
            border: 4px solid #444;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .score {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 20px;
        }
        #blue-score { color: #3b82f6; }
        #red-score { color: #ef4444; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="blue-score" class="score">Mavi (Sen): 0</div>
            <div id="red-score" class="score">Kırmızı (Botlar): 0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Sabit oyun çözünürlüğü (Ekran boyutuna göre bozulmasın diye)
        canvas.width = 800;
        canvas.height = 450;

        // Skorlar
        let playerScore = 0;
        let botScore = 0;

        // Top Nesnesi
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speedX: 4,
            speedY: 4,
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#fff";
                ctx.fill();
                ctx.closePath();
            },
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Üst ve alt duvar çarpışması
                if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
                    this.speedY = -this.speedY;
                }

                // Gol kontrolü (Sol Kale - Oyuncunun Kalesi)
                if (this.x - this.radius < 25) {
                    if (this.y > canvas.height / 2 - 60 && this.y < canvas.height / 2 + 60) {
                        botScore++;
                        document.getElementById("red-score").innerText = "Kırmızı (Botlar): " + botScore;
                        this.reset();
                    } else if (this.x - this.radius < 0) {
                        this.speedX = -this.speedX;
                    }
                }

                // Gol kontrolü (Sağ Kale - Rakip Kale)
                if (this.x + this.radius > canvas.width - 25) {
                    if (this.y > canvas.height / 2 - 60 && this.y < canvas.height / 2 + 60) {
                        playerScore++;
                        document.getElementById("blue-score").innerText = "Mavi (Sen): " + playerScore;
                        this.reset();
                    } else if (this.x + this.radius > canvas.width) {
                        this.speedX = -this.speedX;
                    }
                }
            },
            reset() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.speedX = -this.speedX;
            }
        };

        // Oyuncu Nesnesi (Mavi Takım)
        const player = {
            x: 100,
            y: canvas.height / 2,
            radius: 15,
            speed: 5,
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#3b82f6";
                ctx.fill();
                ctx.closePath();
            }
        };

        // Gelişmiş Bot Nesnesi (Kırmızı Takım - Akıllı Yapay Zeka)
        const bot = {
            x: canvas.width - 100,
            y: canvas.height / 2,
            radius: 15,
            speed: 3.5, // Oyuncudan biraz daha yavaş ki adil olsun
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ef4444";
                ctx.fill();
                ctx.closePath();
            },
            update() {
                // Bug Engelleme: Bot sadece top kendi yarı sahasına geçince veya ortadaysa topa koşar
                if (ball.x > canvas.width / 3) {
                    if (this.y < ball.y - 5) {
                        this.y += this.speed;
                    } else if (this.y > ball.y + 5) {
                        this.y -= this.speed;
                    }
                    
                    // Defansa çok gömülmemesi için ileri doğru da hareket eder
                    if (this.x < ball.x && this.x < canvas.width - 50) {
                        this.x += this.speed * 0.5;
                    } else if (this.x > ball.x && this.x > canvas.width / 2) {
                        this.x -= this.speed * 0.5;
                    }
                } else {
                    // Top uzaktaysa kendi kalesini korumak için güvenli pozisyona geri çekilir
                    if (this.x < canvas.width - 120) this.x += this.speed;
                    if (this.y < canvas.height / 2) this.y += this.speed;
                    if (this.y > canvas.height / 2) this.y -= this.speed;
                }
            }
        };

        // Klavye Kontrolleri
        const keys = {};
        window.addEventListener("keydown", e => keys[e.key] = true);
        window.addEventListener("keyup", e => keys[e.key] = false);

        function handleInput() {
            if ((keys["ArrowUp"] || keys["w"]) && player.y - player.radius > 0) player.y -= player.speed;
            if ((keys["ArrowDown"] || keys["s"]) && player.y + player.radius < canvas.height) player.y += player.speed;
            if ((keys["ArrowLeft"] || keys["a"]) && player.x - player.radius > 0) player.x -= player.speed;
            if ((keys["ArrowRight"] || keys["d"]) && player.x + player.radius < canvas.width / 2) player.x += player.speed; // Kendi yarı sahasından çıkamaz
        }

        // Çarpışma Testi (Dairelerin Çarpışması)
        function checkCollision(obj1, obj2) {
            let dx = obj1.x - obj2.x;
            let dy = obj1.y - obj2.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            return distance < obj1.radius + obj2.radius;
        }

        function handleCollisions() {
            // Oyuncu topa vurursa
            if (checkCollision(player, ball)) {
                ball.speedX = Math.abs(ball.speedX); // Topu ileri fırlat
                ball.speedY = (ball.y - player.y) * 0.3; // Vuruş açısı
            }
            // Bot topa vurursa
            if (checkCollision(bot, ball)) {
                ball.speedX = -Math.abs(ball.speedX); // Topu geri fırlat
                ball.speedY = (ball.y - bot.y) * 0.3;
            }
        }

        // Sahayı Çizme Fonksiyonu
        function drawField() {
            // Arka plan yeşil saha çizgileri esintisi
            ctx.fillStyle = "#1e3a1e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Orta Çizgi
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Orta Yuvarlak
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2);
            ctx.stroke();

            // KENDİ KALEN (Mavi Kale - Sol Taraf)
            ctx.fillStyle = "rgba(59, 130, 246, 0.3)";
            ctx.fillRect(0, canvas.height / 2 - 60, 25, 120);
            ctx.strokeStyle = "#3b82f6";
            ctx.strokeRect(0, canvas.height / 2 - 60, 25, 120);

            // RAKİP KALE (Kırmızı Kale - Sağ Taraf)
            ctx.fillStyle = "rgba(239, 68, 68, 0.3)";
            ctx.fillRect(canvas.width - 25, canvas.height / 2 - 60, 25, 120);
            ctx.strokeStyle = "#ef4444";
            ctx.strokeRect(canvas.width - 25, canvas.height / 2 - 60, 25, 120);
        }

        // Ana Oyun Döngüsü
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            handleInput();
            bot.update();
            ball.update();
            handleCollisions();

            drawField();
            player.draw();
            bot.draw();
            ball.draw();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
